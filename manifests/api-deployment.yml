apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tienda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: json-server
          image: clue/json-server
          ports:
            - containerPort: 80
          volumeMounts:
            - name: db-volumen
              mountPath: /data
      volumes:
        - name: db-volumen
          configMap:
            name: db-json
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tienda
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP   # Solo accesible dentro del clúster — equivalente a "sin ports" en Compose