services:

  web:
    image: ghcr.io/cj-murillo/docker-app:1.2
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mi-red-interna
    depends_on:
      - api

  api:
    image: clue/json-server
    container_name: mi-api
    volumes:
      - ./db.json:/data/db.json:ro
    networks:
      - mi-red-interna
    # ← sin "ports": la API solo es accesible desde dentro de la red

networks:
  mi-red-interna:
    driver: bridge
